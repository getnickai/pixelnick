<svg preserveAspectRatio="none" width="100%" height="100%" viewBox="0 0 1920 1200" xmlns="http://www.w3.org/2000/svg">
<defs>
<filter id="nickIntroDither" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
<feTurbulence type="fractalNoise" baseFrequency="0.32" numOctaves="2" seed="37" stitchTiles="stitch" result="noise"/>
<feColorMatrix in="noise" type="saturate" values="0" result="monochromeNoise"/>
<feComponentTransfer in="monochromeNoise">
<feFuncA type="table" tableValues="1 1"/>
</feComponentTransfer>
</filter>
</defs>
<rect width="1920" height="1200" fill="#808080" filter="url(#nickIntroDither)"/>
</svg>
