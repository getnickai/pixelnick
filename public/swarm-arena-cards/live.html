<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swarm Arena — Live Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="card-styles.css" />
  <style>
    :root { --bg:#08090c; --fg:#e7e7ea; --dim:#8a8a93; --line:#1c1d22; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
      font-family:'Geist', ui-sans-serif, system-ui, sans-serif; }
    header { padding:28px 32px 18px; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 4px; font-size:22px; letter-spacing:.01em; }
    .sub { color:var(--dim); font-size:14px; }
    .bar { display:flex; align-items:center; gap:14px; margin-top:14px; }
    button { font:inherit; font-size:13px; color:var(--fg); background:#15161b;
      border:1px solid var(--line); border-radius:8px; padding:7px 14px; cursor:pointer; }
    button:hover { background:#1d1e25; }
    .status { color:var(--dim); font-size:13px; }
    select { font:inherit; font-size:13px; color:var(--fg); background:#15161b;
      border:1px solid var(--line); border-radius:6px; padding:4px 8px; }
    .sectionhead { display:flex; align-items:baseline; gap:12px; padding:26px 32px 0; }
    .sectionhead h2 { margin:0; font-size:15px; letter-spacing:.08em; text-transform:uppercase; }
    /* Each card renders at its native 650x1136; scale it down for the gallery. */
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
      gap:28px; padding:18px 32px 40px; }
    .cell { display:flex; flex-direction:column; gap:10px; }
    .thumb { width:286px; height:500px; overflow:hidden; border-radius:18px;
      border:1px solid var(--line); }
    .thumb > .sa-card { transform: scale(.44); transform-origin: top left; }
    .cap { display:flex; align-items:center; justify-content:space-between; gap:8px;
      color:var(--dim); font-size:12.5px; }
    .cap .dl { font:inherit; font-size:11.5px; color:var(--fg); background:#15161b;
      border:1px solid var(--line); border-radius:6px; padding:3px 9px; cursor:pointer; }
    .cap .dl:hover { background:#1d1e25; }
    .cap .dl:disabled { opacity:.5; cursor:default; }
    .empty { padding:60px 32px; color:var(--dim); }
  </style>
</head>
<body>
  <header>
    <h1>Swarm Arena — Live Cards</h1>
    <div class="sub">Rendered live in your browser from the R2 agent output. No deploy, no stored PNGs.</div>
    <div class="bar">
      <button id="refresh">Refresh</button>
      <label class="status">Timeline:
        <select id="when"><option value="">Live (now)</option></select>
      </label>
      <label class="status">Theme:
        <select id="theme"><option value="dark">Dark</option><option value="light">Light</option></select>
      </label>
      <span class="status" id="status">Loading…</span>
    </div>
  </header>

  <section>
    <div class="sectionhead"><h2>Upcoming games</h2><span class="status" id="up-status"></span></div>
    <div class="grid" id="upcoming-grid"></div>
  </section>

  <section>
    <div class="sectionhead"><h2>Agent cards</h2></div>
    <div class="grid" id="grid"></div>
  </section>

  <script src="card-engine.js"></script>
  <script src="html-to-image.js"></script>
  <script>
    const grid = document.getElementById("grid");
    const upcomingGrid = document.getElementById("upcoming-grid");
    const statusEl = document.getElementById("status");
    const upStatusEl = document.getElementById("up-status");
    const whenEl = document.getElementById("when");
    const themeEl = document.getElementById("theme");
    let timer = null;
    let datesLoaded = false;
    let theme = "dark";

    // Rasterize a live card to a full-resolution PNG and download it. The card
    // is shown scaled in the gallery; we override the transform so the export
    // is the native 650x1136 at 2x.
    async function downloadCard(cardEl, filename, btn) {
      if (!window.htmlToImage) return;
      const label = btn.textContent;
      btn.disabled = true; btn.textContent = "…";
      try {
        const png = window.htmlToImage.toPng(cardEl, {
          width: 650, height: 1136, pixelRatio: 2, skipFonts: true, cacheBust: false,
          style: { transform: "none", transformOrigin: "top left", margin: "0" },
        });
        // html-to-image can stall on complex SVG/stylesheet DOM; bound it so the
        // tab never freezes. For pixel-perfect exports we fall back to the
        // Remotion pipeline (generate-swarm-cards) — see review notes.
        const dataUrl = await Promise.race([
          png,
          new Promise((_, rej) => setTimeout(() => rej(new Error("export timed out")), 15000)),
        ]);
        const a = document.createElement("a");
        a.href = dataUrl; a.download = filename + ".png"; a.click();
      } catch (e) {
        alert("In-browser PNG export failed (" + e.message + "). Use the render pipeline for now.");
      } finally {
        btn.disabled = false; btn.textContent = label;
      }
    }

    function addCard(html, caption, filename, target = grid) {
      const cell = document.createElement("div");
      cell.className = "cell";
      const thumb = document.createElement("div");
      thumb.className = "thumb";
      thumb.innerHTML = html; // injects the 650x1136 .sa-card
      const cardEl = thumb.firstElementChild;
      const cap = document.createElement("div");
      cap.className = "cap";
      const name = document.createElement("span");
      name.textContent = caption;
      const dl = document.createElement("button");
      dl.className = "dl";
      dl.textContent = "↓ PNG";
      dl.addEventListener("click", () => downloadCard(cardEl, filename, dl));
      cap.appendChild(name);
      cap.appendChild(dl);
      cell.appendChild(thumb);
      cell.appendChild(cap);
      target.appendChild(cell);
    }

    // Upcoming-game preview cards. Independent of the agent deck/timeline:
    // rendered live from /api/swarm-upcoming (mirror: fixtures + Elo). Honest
    // Elo-only preview — no per-fixture agent council exists yet (STA-405).
    let upcomingGames = null;
    function paintUpcoming() {
      if (!upcomingGames) return;
      upcomingGrid.innerHTML = "";
      if (!upcomingGames.length) {
        upcomingGrid.innerHTML = '<div class="empty">No upcoming fixtures right now.</div>';
        return;
      }
      const opts = { theme, size: "portrait" };
      for (const g of upcomingGames) {
        const slug = `${(g.home.code || "").toLowerCase()}-${(g.away.code || "").toLowerCase()}`;
        addCard(window.SA.renderMatchCard(g, opts), `${g.home.name} vs ${g.away.name}`, `preview-${slug}`, upcomingGrid);
      }
    }
    async function renderUpcoming() {
      upStatusEl.textContent = "Loading…";
      try {
        const res = await fetch("/api/swarm-upcoming", { cache: "no-store" });
        if (!res.ok) throw new Error("upcoming " + res.status);
        const feed = await res.json();
        upcomingGames = (feed.games || []).slice().sort((a, b) =>
          (a.kickoffISO < b.kickoffISO ? -1 : a.kickoffISO > b.kickoffISO ? 1 : 0));
        paintUpcoming();
        upStatusEl.textContent = `${upcomingGames.length} fixture(s)`;
      } catch (err) {
        upcomingGrid.innerHTML = `<div class="empty">Could not load upcoming fixtures (${err}).</div>`;
        upStatusEl.textContent = "Error";
      }
    }

    // The selector value is a date (YYYY-MM-DD) or "" for live. A date maps to
    // end-of-day UTC so the deck reflects every run from that day.
    function atParam() {
      const v = whenEl.value;
      return v ? `?at=${encodeURIComponent(v + "T23:59:59.999Z")}` : "";
    }

    async function render() {
      statusEl.textContent = "Fetching deck…";
      try {
        const res = await fetch("/api/swarm-deck" + atParam(), { cache: "no-store" });
        if (!res.ok) throw new Error("deck " + res.status);
        const deck = await res.json();

        // Populate the timeline once: Live + each available run date (newest first).
        if (!datesLoaded && Array.isArray(deck.availableDates)) {
          for (const d of [...deck.availableDates].reverse()) {
            const o = document.createElement("option");
            o.value = d; o.textContent = d;
            whenEl.appendChild(o);
          }
          datesLoaded = true;
        }

        window.SA.load(deck);
        grid.innerHTML = "";
        const opts = { theme, size: "portrait" };
        const period = deck.at ? deck.at.slice(0, 10) : "live";
        addCard(window.SA.renderLeaderboardCard(opts), "Leaderboard", `leaderboard-${period}`);
        for (const a of deck.agents) {
          addCard(
            window.SA.renderAgentCard(a.handle, { ...opts, variant: "ridge", layout: "editorial" }),
            a.label,
            `agent-${a.handle.toLowerCase()}-${period}`,
          );
        }
        const when = deck.at ? `as of ${deck.at.slice(0, 10)}` : `live · updated ${new Date().toLocaleTimeString()}`;
        statusEl.textContent = `${deck.agents.length} agent(s) · ${when}`;
      } catch (err) {
        grid.innerHTML = `<div class="empty">Could not load deck (${err}).</div>`;
        statusEl.textContent = "Error";
      }
    }

    // Auto-refresh only in live mode; a historical point is fixed.
    function syncTimer() {
      if (timer) clearInterval(timer);
      if (!whenEl.value) timer = setInterval(render, 60000);
    }

    document.getElementById("refresh").addEventListener("click", () => { render(); renderUpcoming(); });
    whenEl.addEventListener("change", () => { syncTimer(); render(); });
    themeEl.addEventListener("change", () => {
      theme = themeEl.value === "light" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", theme);
      // Re-render both grids from already-loaded data (no refetch).
      if (window.SA) render();
      paintUpcoming();
    });
    render();
    renderUpcoming();
    syncTimer();
  </script>
</body>
</html>
