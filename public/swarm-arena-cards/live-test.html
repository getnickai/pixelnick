<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swarm Arena — live data test</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="stylesheet" href="card-styles.css" />
<style>
  body { margin: 0; background: #0b0b0e; display: flex; gap: 30px; padding: 30px; align-items: flex-start; font-family: monospace; }
  .col { display: flex; flex-direction: column; }
  .cap { color: #8a8a93; font-size: 13px; margin-bottom: 10px; letter-spacing: 0.04em; }
  #err { color: #ff6b6b; font-family: monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<div id="err"></div>
<script src="card-engine.js"></script>
<script>
(async function () {
  try {
    const deck = await (await fetch("live-deck.json?ts=" + Date.now())).json();
    SA.load(deck);
    const a = SA.AGENTS[0];
    const mk = (label, html) => {
      const c = document.createElement("div");
      c.className = "col";
      c.innerHTML = '<div class="cap">' + label + '</div>' + html;
      document.body.appendChild(c);
    };
    mk("agent · editorial", SA.renderAgentCard(a.handle, { layout: "editorial", theme: "dark", size: "portrait" }));
    mk("agent · terminal", SA.renderAgentCard(a.handle, { variant: "terminal", theme: "dark", size: "portrait" }));
  } catch (e) {
    document.getElementById("err").textContent = "Render error: " + (e && e.stack || e);
  }
})();
</script>
</body>
</html>
