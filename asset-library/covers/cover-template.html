<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face{font-family:'Duplet';src:url('src/Duplet-Semibold.woff') format('woff');font-weight:600;font-style:normal;}
  @font-face{font-family:'Duplet';src:url('src/Duplet-Regular.woff') format('woff');font-weight:400;font-style:normal;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100vw;height:100vh;}
  body{
    font-family:'Duplet','Inter',sans-serif;background:#FFFFFF;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  /* fixed design canvas, scaled to fit any output size */
  .stage{width:1200px;height:630px;position:relative;flex:none;display:flex;align-items:center;background:#FFFFFF;}
  .left{width:660px;padding:64px 0 64px 72px;display:flex;flex-direction:column;height:100%;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand svg{width:38px;height:38px;color:#0178FF;display:block;}
  .brand .wm{font-family:'Duplet';font-weight:600;font-size:34px;letter-spacing:-.02em;color:#12151C;line-height:1;}
  .mid{flex:1;display:flex;flex-direction:column;justify-content:center;}
  h1{font-family:'Duplet';font-weight:600;font-size:60px;line-height:1.05;letter-spacing:-.025em;color:#12151C;max-width:560px;}
  .sub{font-family:'Duplet';font-weight:400;font-size:26px;line-height:1.35;color:#5B6472;max-width:520px;margin-top:22px;}
  .cta{display:inline-flex;align-items:center;gap:11px;align-self:flex-start;background:#0178FF;color:#FFFFFF;font-family:'Duplet';font-weight:600;font-size:23px;letter-spacing:-.01em;padding:15px 28px;border-radius:999px;line-height:1;}
  .cta svg{width:21px;height:21px;display:block;}
  .right{position:absolute;top:0;right:0;width:480px;height:100%;padding:40px 40px 40px 0;}
  .block{width:100%;height:100%;border-radius:28px;overflow:hidden;background:url('src/deco.jpg') center 28%/cover no-repeat;display:flex;align-items:center;justify-content:center;}
  .nmark{width:158px;height:158px;filter:drop-shadow(0 2px 10px rgba(0,0,0,.18));}
</style>
</head>

<script>
  var p=new URLSearchParams(location.search);
  if(p.get('title'))document.getElementById('title').textContent=p.get('title');
  if(p.get('subtitle'))document.getElementById('subtitle').textContent=p.get('subtitle');
  if(p.get('cta'))document.getElementById('cta').textContent=p.get('cta');
  /* scale the 1200x630 design to fill the output canvas, centered */
  function fit(){
    var s=document.getElementById('stage');
    var k=Math.min(window.innerWidth/1200, window.innerHeight/630);
    s.style.transform='scale('+k+')';
  }
  fit();window.addEventListener('resize',fit);
</script>
